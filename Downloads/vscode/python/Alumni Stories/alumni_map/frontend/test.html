<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Fixed Alumni Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            center: [20.5937, 78.9629],
            zoom: 5,
            zoomControl: true,
            scrollWheelZoom: true,
            doubleClickZoom: true,
            dragging: true,
            touchZoom: true
        });

        // English-only tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap, &copy; CARTO'
        }).addTo(map);

        // Enable all gestures explicitly
        map.scrollWheelZoom.enable();
        map.touchZoom.enable();
        map.dragging.enable();
        map.doubleClickZoom.enable();

        // Add some markers
        const alumni = [
            { name: "Rahul", lat: 12.9716, lng: 77.5946, role: "Engineer" },
            { name: "Priya", lat: 19.0760, lng: 72.8777, role: "Designer" },
            { name: "Arjun", lat: 28.6139, lng: 77.2090, role: "Manager" }
        ];

        alumni.forEach(a => {
            L.marker([a.lat, a.lng])
                .addTo(map)
                .bindPopup(`<h3>${a.name}</h3><p>${a.role}</p>`);
        });
    </script>
</body>

</html>
